name: Update Japan Version

on:
  schedule:
    # Check every 2 hours from 01:00 (10:00 JST) to 14:00 (23:00 JST) everyday
    - cron: "0 1-14/2 * * *"
  workflow_dispatch:
    inputs:
      force_update:
        type: boolean
        required: false
        description: "Force update the game version"
      package_name:
        type: string
        required: false
        description: "The package name of the APK"
        default: "com.YostarJP.BlueArchive"
      apk_url:
        type: string
        required: false
        description: "Direct URL to the APK to download (overrides package name)"
        default: ""
      override_version:
        type: string
        required: false
        description: "Override the detected version"
        default: ""

env:
  PACKAGE_NAME: ${{ inputs.package_name || 'com.YostarJP.BlueArchive' }}
  APK_URL: ${{ inputs.apk_url || '' }}
  FORCE_UPDATE: ${{ inputs.force_update || 'false' }}
  OVERRIDE_VERSION: ${{ inputs.override_version || '' }}

jobs:
  inspect-apk:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.inspect-apk.outputs.skip }}
      version: ${{ steps.inspect-apk.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/actions/apk_inspector/
            scripts/
            .tools/Il2CppInspector.Redux.CLI
            requirements.txt
          sparse-checkout-cone-mode: false
          fetch-depth: 0

      - name: Inspect APK
        id: inspect-apk
        uses: ./.github/actions/apk_inspector
        with:
          package_name: ${{ env.PACKAGE_NAME }}
          force_update: ${{ env.FORCE_UPDATE }}
          blacklist_versions: ${{ vars.JAPAN_BLACKLISTED_VERSIONS || '' }}
          apk_url: ${{ env.APK_URL || '' }}
          override_version: ${{ env.OVERRIDE_VERSION || '' }}

      - name: Install dependencies
        if: steps.inspect-apk.outputs.skip == 'false'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep zip unzip

      - name: Prepare for decompilation
        if: steps.inspect-apk.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./tmp/Data
          unzip -q output.xapk
          unzip -p config.arm64_v8a.apk lib/arm64-v8a/libil2cpp.so > libil2cpp.so
          unzip -p ${{ env.PACKAGE_NAME }}.apk assets/bin/Data/Managed/Metadata/global-metadata.dat > global-metadata.dat
          unzip -j UnityDataAssetPack.apk "assets/bin/Data/*" -d ./tmp/Data/

      - name: Decompile APK
        id: decompile-apk
        if: steps.inspect-apk.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/decompile.sh

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Extract bundle version
        id: extract-bundle-version
        if: steps.inspect-apk.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          pip install -r requirements.txt
          python ./scripts/dump_config.py -i ./tmp/Data/ -o ./tmp/GameMainConfig.bytes
          python ./scripts/decrypt_config.py -i ./tmp/GameMainConfig.bytes -o ./GameMainConfig.json

      - name: Save outputs to raw/
        if: steps.inspect-apk.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ steps.inspect-apk.outputs.version }}"
          PKG="${{ env.PACKAGE_NAME }}"

          RAW_DIR="raw/bluearchive/${PKG}/${VERSION}"
          mkdir -p "${RAW_DIR}/apks" "${RAW_DIR}/libraries" "${RAW_DIR}/decompiled"

          # 元信息
          echo -n "${VERSION}" > "${RAW_DIR}/version.txt"
          echo -n "${{ steps.decompile-apk.outputs.offset }}" > "${RAW_DIR}/decompiled/offset.txt"

          # DiffableCs 打包
          zip -r "${RAW_DIR}/decompiled/decompiled.zip" ./DiffableCs/ > /dev/null

          # 复制产物
          cp -f ./output.xapk "${RAW_DIR}/apks/output.xapk"
          cp -f ./libil2cpp.so "${RAW_DIR}/libraries/libil2cpp.so"
          cp -f ./global-metadata.dat "${RAW_DIR}/libraries/global-metadata.dat"
          cp -f ./GameMainConfig.json "${RAW_DIR}/decompiled/GameMainConfig.json"

          # 额外：给一个 latest 指针（方便你总是取最新）
          LATEST_DIR="raw/bluearchive/${PKG}/latest"
          rm -rf "${LATEST_DIR}"
          mkdir -p "${LATEST_DIR}"
          echo -n "${VERSION}" > "${LATEST_DIR}/version.txt"
          cp -f "${RAW_DIR}/apks/output.xapk" "${LATEST_DIR}/output.xapk"
          cp -f "${RAW_DIR}/libraries/libil2cpp.so" "${LATEST_DIR}/libil2cpp.so"
          cp -f "${RAW_DIR}/libraries/global-metadata.dat" "${LATEST_DIR}/global-metadata.dat"
          cp -f "${RAW_DIR}/decompiled/offset.txt" "${LATEST_DIR}/offset.txt"
          cp -f "${RAW_DIR}/decompiled/decompiled.zip" "${LATEST_DIR}/decompiled.zip"
          cp -f "${RAW_DIR}/decompiled/GameMainConfig.json" "${LATEST_DIR}/GameMainConfig.json"

      - name: Upload raw as artifact
        if: steps.inspect-apk.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: raw-${{ env.PACKAGE_NAME }}-${{ steps.inspect-apk.outputs.version }}
          path: raw/
          retention-days: 30
